experiment_name: rw_gen_positioning_type#qwen3_4b#distill_deepseek-v4-pro
model_name_or_path: model/Qwen3-4B
dataset_path: train_data/lora_data/rw_gen_positioning_type_944_distill_deepseek-v4-pro.jsonl
split_path: train_data/lora_data/splits/rw_gen_positioning_type_deepseek-v4-pro_seed20260720.json
output_root: train_outputs/rw_gen_positioning_type

